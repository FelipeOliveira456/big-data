<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-label="Label Propagation: nós adoptam rótulos dos vizinhos">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="720" height="280" rx="12" fill="url(#bg)"/>
  <text x="360" y="32" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" font-weight="600">Label Propagation  uma iteraçăo</text>
  <text x="360" y="52" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">cada nó vota no rótulo mais frequente entre os vizinhos (snapshot síncrono)</text>
  <!-- edges -->
  <g stroke="#475569" stroke-width="1.5" opacity="0.7">
    <line x1="120" y1="140" x2="200" y2="100"/><line x1="120" y1="140" x2="200" y2="180"/>
    <line x1="200" y1="100" x2="280" y2="120"/><line x1="200" y1="180" x2="280" y2="160"/>
    <line x1="280" y1="120" x2="360" y2="140"/><line x1="280" y1="160" x2="360" y2="140"/>
    <line x1="360" y1="140" x2="440" y2="110"/><line x1="360" y1="140" x2="440" y2="170"/>
    <line x1="440" y1="110" x2="520" y2="130"/><line x1="440" y1="170" x2="520" y2="150"/>
    <line x1="520" y1="130" x2="600" y2="140"/><line x1="520" y1="150" x2="600" y2="140"/>
    <line x1="200" y1="100" x2="200" y2="180"/><line x1="440" y1="110" x2="440" y2="170"/>
  </g>
  <!-- community A blue -->
  <circle cx="120" cy="140" r="22" fill="#3b82f6" filter="url(#glow)"/>
  <circle cx="200" cy="100" r="18" fill="#3b82f6"/><circle cx="200" cy="180" r="18" fill="#3b82f6"/>
  <circle cx="280" cy="120" r="18" fill="#3b82f6"/>
  <!-- community B emerald -->
  <circle cx="280" cy="160" r="18" fill="#10b981"/><circle cx="360" cy="140" r="24" fill="#10b981" filter="url(#glow)"/>
  <circle cx="440" cy="110" r="18" fill="#10b981"/><circle cx="440" cy="170" r="18" fill="#10b981"/>
  <!-- community C amber -->
  <circle cx="520" cy="130" r="18" fill="#f59e0b"/><circle cx="520" cy="150" r="18" fill="#f59e0b"/>
  <circle cx="600" cy="140" r="22" fill="#f59e0b" filter="url(#glow)"/>
  <!-- highlight center node voting -->
  <circle cx="360" cy="140" r="32" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="360" y="145" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="11" font-weight="700">?</text>
  <text x="360" y="210" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="12">nó central: vota no rótulo majoritário dos vizinhos</text>
  <!-- legend -->
  <circle cx="180" cy="248" r="8" fill="#3b82f6"/><text x="195" y="252" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="11">Comunidade A</text>
  <circle cx="320" cy="248" r="8" fill="#10b981"/><text x="335" y="252" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="11">Comunidade B</text>
  <circle cx="460" cy="248" r="8" fill="#f59e0b"/><text x="475" y="252" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="11">Comunidade C</text>
</svg>
