<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-label="Label Propagation: triângulo e par formam duas comunidades">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="720" height="280" rx="12" fill="url(#bg)" stroke="#cbd5e1"/>

  <text x="360" y="36" text-anchor="middle" fill="#334155" font-family="system-ui,sans-serif" font-size="15" font-weight="600">
    Label Propagation  dois grupos densos
  </text>
  <text x="360" y="56" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="12">
    Cada nó adopta o rótulo majoritário dos vizinhos ’ convergem 2 comunidades
  </text>

  <!-- Comunidade 1: triângulo -->
  <rect x="40" y="72" width="300" height="188" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-dasharray="6 4"/>
  <text x="190" y="98" text-anchor="middle" fill="#1d4ed8" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Comunidade A</text>
  <text x="190" y="116" text-anchor="middle" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="11">3 nós, 3 arestas (triângulo)</text>

  <line x1="190" y1="168" x2="130" y2="228" stroke="#64748b" stroke-width="2.5"/>
  <line x1="190" y1="168" x2="250" y2="228" stroke="#64748b" stroke-width="2.5"/>
  <line x1="130" y1="228" x2="250" y2="228" stroke="#64748b" stroke-width="2.5"/>

  <circle cx="190" cy="158" r="22" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
  <text x="190" y="164" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">1</text>

  <circle cx="130" cy="228" r="22" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
  <text x="130" y="234" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">2</text>

  <circle cx="250" cy="228" r="22" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
  <text x="250" y="234" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">3</text>

  <!-- separador -->
  <line x1="360" y1="88" x2="360" y2="248" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- Comunidade 2: par -->
  <rect x="380" y="72" width="300" height="188" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-dasharray="6 4"/>
  <text x="530" y="98" text-anchor="middle" fill="#047857" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Comunidade B</text>
  <text x="530" y="116" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="11">2 nós, 1 aresta (par)</text>

  <line x1="470" y1="198" x2="590" y2="198" stroke="#64748b" stroke-width="2.5"/>

  <circle cx="470" cy="198" r="22" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="470" y="204" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">4</text>

  <circle cx="590" cy="198" r="22" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="590" y="204" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">5</text>

  <text x="360" y="268" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">
    Sem arestas entre os grupos ’ rótulos năo se misturam
  </text>
</svg>
