<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" role="img" aria-label="Duas comunidades: triangulo de 3 nos e par de 2 nos">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="720" height="260" rx="12" fill="url(#bg)" stroke="#cbd5e1"/>

  <text x="360" y="34" text-anchor="middle" fill="#334155" font-family="system-ui,sans-serif" font-size="15" font-weight="600">
    Duas comunidades no grafo
  </text>
  <text x="360" y="54" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="12">
    Grupos densos separados por poucas (ou nenhuma) aresta entre si
  </text>

  <rect x="40" y="68" width="300" height="168" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-dasharray="6 4"/>
  <text x="190" y="92" text-anchor="middle" fill="#1d4ed8" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Comunidade A</text>
  <text x="190" y="110" text-anchor="middle" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="11">3 nos, 3 arestas (triangulo)</text>

  <line x1="190" y1="152" x2="130" y2="212" stroke="#64748b" stroke-width="2.5"/>
  <line x1="190" y1="152" x2="250" y2="212" stroke="#64748b" stroke-width="2.5"/>
  <line x1="130" y1="212" x2="250" y2="212" stroke="#64748b" stroke-width="2.5"/>

  <circle cx="190" cy="142" r="22" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
  <text x="190" y="148" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">1</text>

  <circle cx="130" cy="212" r="22" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
  <text x="130" y="218" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">2</text>

  <circle cx="250" cy="212" r="22" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
  <text x="250" y="218" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">3</text>

  <line x1="360" y1="80" x2="360" y2="224" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 6"/>

  <rect x="380" y="68" width="300" height="168" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-dasharray="6 4"/>
  <text x="530" y="92" text-anchor="middle" fill="#047857" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Comunidade B</text>
  <text x="530" y="110" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="11">2 nos, 1 aresta (par)</text>

  <line x1="470" y1="182" x2="590" y2="182" stroke="#64748b" stroke-width="2.5"/>

  <circle cx="470" cy="182" r="22" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="470" y="188" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">4</text>

  <circle cx="590" cy="182" r="22" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="590" y="188" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">5</text>

  <text x="360" y="248" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">
    Sem arestas entre os grupos
  </text>
</svg>
