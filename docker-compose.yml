services:
  lpa:
    build: .
    image: distributed-lpa:latest
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./config.yaml.example:/app/config.yaml:ro
    environment:
      GRAPH_RAW_PATH: data/raw/soc-orkut-relationships.txt
      LPA_MAX_ITER: "100"
      BENCHMARK_FRACTIONS: "1,10,100"
      BENCHMARK_RUNS: "3"
      BENCHMARK_BACKEND: both
      BENCHMARK_WORKERS: "2,4,6"
      # LPA_WORKERS: unset → uses container CPU count when BENCHMARK_WORKERS empty
